<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    var pathname = window.location.pathname;
    var targetPath = pathname;
    if (targetPath.endsWith('/')) {
      targetPath = targetPath.slice(0, -1);
    }
    if (targetPath.endsWith('/campuslogin')) {
      targetPath = targetPath.substring(0, targetPath.length - '/campuslogin'.length);
    }
    if (!targetPath.endsWith('/')) {
      targetPath += '/';
    }
    var targetUrl = window.location.origin + targetPath + '#campuslogin';
    window.location.replace(targetUrl);
  </script>
</head>
<body>
  <p>Redirecting to FSU CMS Control Center...</p>
</body>
</html>
